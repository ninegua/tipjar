canisters:
  - name: tipjar
    build:
      steps: 
        - type: pre-built
          path: dist/tipjar.wasm
  - name: blackhole
    build:
      steps: 
        - type: pre-built
          path: dist/blackhole-opt.wasm
  - name: logger
    build:
      steps: 
        - type: pre-built
          path: dist/logger.wasm
  - name: frontend
    recipe:
      type: "@dfinity/asset-canister@v2.2.1"
      configuration:
        build:
          - make frontend
        dir: dist/frontend
environments:
  - name: ic
    network: ic
    canisters: [tipjar, logger, frontend]
    settings:
      tipjar:
        environment_variables:
          "PUBLIC_CANISTER_ID:blackhole": "e3mmv-5qaaa-aaaah-aadma-cai"
