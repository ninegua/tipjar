canisters:
  - name: tipjar
    build:
      steps: 
        - type: pre-built
          path: dist/tipjar.wasm
  - name: blackhole
    build:
      steps: 
        - type: pre-built
          path: dist/blackhole-opt.wasm
  - name: logger
    build:
      steps: 
        - type: pre-built
          path: dist/logger.wasm
  - name: frontend
    recipe:
      type: "@dfinity/asset-canister@v2.2.1"
      configuration:
        build:
          - make frontend
        dir: dist/tipjar_assets
